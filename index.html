<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Sinefa Chat</title>
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100%; font-family: sans-serif; 
            overflow: hidden; background-color: #000; color: #0f0;
        }
        #main-container {
            display: flex; flex-direction: column; width: 100vw; height: 100vh; 
            padding: 10px; box-sizing: border-box;
        }
        #chat-wrapper {
            position: relative; flex: 1; border: 4px solid #00ff00; 
            margin-bottom: 10px; border-radius: 15px; display: flex; overflow: hidden;
            background: rgba(0, 0, 0, 0.95);
        }
        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px; color: #fff; 
            display: flex; flex-direction: column; gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: #00ff00 #111;
        }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
        #chat-box::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 10px; }
        #chat-box::-webkit-scrollbar-thumb:hover { background: #33ff33; }

        #users-list {
            width: 180px; padding: 10px; overflow-y: auto; color: #0f0; 
            border-left: 2px solid #00ff00; background: rgba(0, 20, 0, 0.8);
            scrollbar-width: thin;
            scrollbar-color: #00ff00 #111;
        }
        #users-list::-webkit-scrollbar { width: 6px; }
        #users-list::-webkit-scrollbar-track { background: #111; }
        #users-list::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 10px; }

        #chat-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex; align-items: center; 
            justify-content: center; text-align: center; z-index: 100; border-radius: 15px;
            color: #00ff00; font-size: 18px;
        }
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: none; align-items: center; 
            justify-content: center; z-index: 999; color: #00ff00; font-size: 32px; 
            font-weight: bold; text-align: center;
        }
        #login-screen { 
            display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; 
        }
        #chat-controls {
            display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; 
            align-items: center; flex-wrap: wrap;
        }
        #msg-input { 
            flex: 1; max-width: 700px; height: 40px; padding: 8px; 
            background: #111; color: #0f0; border: 2px solid #00ff00; border-radius: 8px;
        }
        button { 
            height: 40px; padding: 0 15px; background: #00ff00; color: #000; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #33ff33; }
        .message { 
            max-width: 80%; padding: 8px 12px; border-radius: 12px; 
            background: rgba(0, 50, 0, 0.7); align-self: flex-start;
        }
        .message.own { 
            background: rgba(0, 100, 0, 0.85); align-self: flex-end; 
        }
        #emoji-picker {
            display: none; position: absolute; bottom: 60px; background: #111; 
            border: 2px solid #00ff00; padding: 10px; border-radius: 10px; 
            max-width: 300px; flex-wrap: wrap; gap: 5px; z-index: 200;
        }
        .emoji { font-size: 24px; cursor: pointer; padding: 4px; }
        .emoji:hover { background: #00ff00; color: #000; border-radius: 4px; }
    </style>
    <style>
        body {
            background-image: url('fonto.jpg'); 
            background-repeat: no-repeat; background-attachment: fixed; 
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body>
    <div id="welcome-overlay"></div>
    <div id="main-container">
        <div id="chat-wrapper">
            <div id="chat-box"></div>
            <div id="users-list">
                <strong>Ενεργοί Χρήστες:</strong><br>
                <div id="users-box"></div>
            </div>
            <div id="chat-cover">
                <p>Για να δεις τα μηνύματα και να συμμετάσχεις<br>βάλε το όνομά σου και κάνε Είσοδος!</p>
            </div>
        </div>
        
        <div id="login-screen">
            <input type="text" id="username" placeholder="Το όνομά σου..." maxlength="20">
            <button id="enter-btn">Είσοδος</button>
        </div>
         
        <div id="chat-controls" style="display:none;">
            <input type="text" id="msg-input" placeholder="Γράψε μήνυμα...">
            <button id="send-btn">📤 Αποστολή</button>
            <button id="emoji-btn">😀</button>
            <button id="image-btn">🖼️</button>
            <input type="file" id="image-upload" accept="image/*" style="display:none;">
            <button onclick="localStorage.clear(); location.reload();">🚪 Έξοδος</button>
            <button id="toggle-theme">🌙</button>
        </div>
    </div>

    <div id="emoji-picker"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, setDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATL9Y_6Vn-IVK-TBHvPQxcjMu_kduCbcc",
            authDomain: "chat-sinefa.firebaseapp.com",
            projectId: "chat-sinefa",
            storageBucket: "chat-sinefa.firebasestorage.app",
            messagingSenderId: "142067892049",
            appId: "1:142067892049:web:8bc03520d3d1c78d451d70"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentName = localStorage.getItem("chatUser");
        let isLoggedIn = !!currentName && !currentName.startsWith("Guest_");

        async function updatePresence() {
            if (!isLoggedIn) return;
            try { await setDoc(doc(db, "online", currentName), { lastSeen: Date.now() }); } catch(e) {}
        }
        if (isLoggedIn) {
            updatePresence();
            setInterval(updatePresence, 8000);
        }

        document.getElementById("enter-btn").onclick = async () => {
            let newName = document.getElementById("username").value.trim();
            if (!newName) return alert("Πρέπει να βάλεις όνομα!");
            const welcomeDiv = document.getElementById("welcome-overlay");
            welcomeDiv.innerHTML = `Καλώς ήρθες, <strong>${newName}</strong>! 🎉<br>Φόρτωση...`;
            welcomeDiv.style.display = "flex";
            if (currentName && currentName.startsWith("Guest_")) {
                try { await deleteDoc(doc(db, "online", currentName)); } catch(e){}
            }
            localStorage.setItem("chatUser", newName);
            setTimeout(() => location.reload(), 1200);
        };

        if (isLoggedIn) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("chat-controls").style.display = "flex";
            document.getElementById("chat-cover").style.display = "none";
        } else {
            currentName = "Guest_" + Math.floor(Math.random() * 1000);
        }

        async function sendMessage(text, imageUrl = null) {
            if (!isLoggedIn || (!text && !imageUrl)) return;
            try {
                await addDoc(collection(db, "chat"), { user: currentName, text: text || "", image: imageUrl, timestamp: Date.now() });
            } catch(e) {}
        }

        document.getElementById("send-btn").onclick = () => {
            const input = document.getElementById("msg-input");
            sendMessage(input.value.trim());
            input.value = "";
        };

        document.getElementById("msg-input").addEventListener("keypress", e => {
            if (e.key === "Enter") document.getElementById("send-btn").click();
        });

        const chatBox = document.getElementById("chat-box");
        if (isLoggedIn) {
            onSnapshot(query(collection(db, "chat"), orderBy("timestamp", "desc"), limit(50)), (snapshot) => {
                chatBox.innerHTML = "";
                snapshot.docs.reverse().forEach(d => {
                    const data = d.data();
                    const isOwn = data.user === currentName;
                    const msgDiv = document.createElement("div");
                    msgDiv.className = `message ${isOwn ? 'own' : ''}`;
                    let html = `<strong>${data.user}:</strong> `;
                    if (data.text) html += data.text;
                    if (data.image) html += `<br><img src="${data.image}" style="max-width:280px; border-radius:8px; margin-top:6px;">`;
                    msgDiv.innerHTML = html;
                    chatBox.appendChild(msgDiv);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        if (isLoggedIn) {
            setInterval(() => {
                const cutoff = Date.now() - 25000;
                onSnapshot(query(collection(db, "online"), where("lastSeen", ">", cutoff)), (snapshot) => {
                    const box = document.getElementById("users-box");
                    box.innerHTML = "";
                    snapshot.forEach(d => box.innerHTML += `<div style="margin:3px 0; padding:4px;">👤 ${d.id}</div>`);
                });
            }, 7000);
        }

        const emojis = ["😀","😂","😍","🥰","😎","🔥","❤️","👍","👎","🎉","🚀","💯","🙌","😢","😱"];
        const picker = document.getElementById("emoji-picker");
        emojis.forEach(emo => {
            const span = document.createElement("span");
            span.className = "emoji";
            span.textContent = emo;
            span.onclick = () => {
                document.getElementById("msg-input").value += emo;
                picker.style.display = "none";
            };
            picker.appendChild(span);
        });

        document.getElementById("emoji-btn").onclick = (e) => {
            e.stopPropagation();
            picker.style.display = picker.style.display === "flex" ? "none" : "flex";
        };
        document.addEventListener("click", () => picker.style.display = "none");

        document.getElementById("image-btn").onclick = () => document.getElementById("image-upload").click();
        document.getElementById("image-upload").onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !isLoggedIn) return;
            const reader = new FileReader();
            reader.onload = (ev) => sendMessage("", ev.target.result);
            reader.readAsDataURL(file);
        };

        let isDark = true;
        document.getElementById("toggle-theme").onclick = () => {
            isDark = !isDark;
            const btn = document.getElementById("toggle-theme");
            btn.textContent = isDark ? "🌙" : "☀️";
            if (isDark) {
                document.body.style.backgroundColor = "#000";
                document.getElementById("chat-wrapper").style.backgroundColor = "rgba(0,0,0,0.95)";
            } else {
                document.body.style.backgroundColor = "#222233";
                document.getElementById("chat-wrapper").style.backgroundColor = "rgba(40,40,60,0.95)";
            }
        };
    </script>
</body>
</html>
