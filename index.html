<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Sinefa Chat</title>
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100%; font-family: sans-serif; 
            overflow: hidden; background-color: #000; color: #0f0;
        }
        #main-container {
            display: flex; flex-direction: column; width: 100vw; height: 100vh; 
            padding: 10px; box-sizing: border-box;
        }
        #chat-header {
            background: rgba(0, 30, 0, 0.9); border: 2px solid #00ff00;
            padding: 8px 15px; margin-bottom: 5px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; color: #00ff00;
        }
        #chat-wrapper {
            position: relative; flex: 1; border: 4px solid #00ff00; 
            margin-bottom: 10px; border-radius: 15px; display: flex; overflow: hidden;
            background: rgba(0, 0, 0, 0.95);
        }
        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px; color: #fff; 
            display: flex; flex-direction: column; gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: #00ff00 #111;
        }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
        #chat-box::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 10px; }
        #chat-box::-webkit-scrollbar-thumb:hover { background: #33ff33; }

        #users-list {
            width: 180px; padding: 10px; overflow-y: auto; color: #0f0; 
            border-left: 2px solid #00ff00; background: rgba(0, 20, 0, 0.8);
            scrollbar-width: thin;
            scrollbar-color: #00ff00 #111;
        }
        #users-list::-webkit-scrollbar { width: 6px; }
        #users-list::-webkit-scrollbar-track { background: #111; }
        #users-list::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 10px; }

        .user-row {
            margin: 5px 0; padding: 6px; border: 1px solid #00ff00; 
            border-radius: 5px; cursor: pointer; background: rgba(0,40,0,0.4);
            transition: 0.2s; text-align: center; font-weight: bold;
            position: relative;
        }
        .user-row:hover {
            background: #00ff00; color: #000;
        }
        .unread-badge {
            background: #ff3333; color: white; font-size: 11px; padding: 2px 5px;
            border-radius: 4px; display: inline-block; margin-left: 5px;
            animation: blinker 1.5s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0.4; }
        }

        #chat-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex; align-items: center; 
            justify-content: center; text-align: center; z-index: 100; border-radius: 15px;
            color: #00ff00; font-size: 18px;
        }
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: none; align-items: center; 
            justify-content: center; z-index: 999; color: #00ff00; font-size: 32px; 
            font-weight: bold; text-align: center;
        }
        #login-screen { 
            display: flex; gap: 10px; margin-bottom: 10px; justify-content: center; 
        }
        #chat-controls {
            display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; 
            align-items: center; flex-wrap: wrap;
        }
        #msg-input { 
            flex: 1; max-width: 700px; height: 40px; padding: 8px; 
            background: #111; color: #0f0; border: 2px solid #00ff00; border-radius: 8px;
        }
        button { 
            height: 40px; padding: 0 15px; background: #00ff00; color: #000; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #33ff33; }
        .message { 
            max-width: 80%; padding: 8px 12px; border-radius: 12px; 
            background: rgba(0, 50, 0, 0.7); align-self: flex-start;
        }
        .message.own { 
            background: rgba(0, 100, 0, 0.85); align-self: flex-end; 
        }
        .message.private-msg {
            border: 1px dashed #ff00ff;
            background: rgba(60, 0, 60, 0.7);
        }
        .message.own.private-msg {
            background: rgba(100, 0, 100, 0.85);
        }
        #emoji-picker {
            display: none; position: absolute; bottom: 60px; background: #111; 
            border: 2px solid #00ff00; padding: 10px; border-radius: 10px; 
            max-width: 300px; flex-wrap: wrap; gap: 5px; z-index: 200;
        }
        .emoji { font-size: 24px; cursor: pointer; padding: 4px; }
        .emoji:hover { background: #00ff00; color: #000; border-radius: 4px; }
        .back-btn { background: #ff3333; color: white; padding: 4px 10px; height: auto; font-size: 13px; }
        .back-btn:hover { background: #ff0000; }
    </style>
    <style>
        body {
            background-image: url('fonto.jpg'); 
            background-repeat: no-repeat; background-attachment: fixed; 
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body>
    <div id="welcome-overlay"></div>
    <div id="main-container">
        <div id="chat-header" style="display: none;">
            <span id="room-title">Δωμάτιο: Γενικό Chat</span>
            <button id="back-to-global" class="back-btn" style="display: none;">⬅️ Επιστροφή στο Γενικό</button>
        </div>

        <div id="chat-wrapper">
            <div id="chat-box"></div>
            <div id="users-list">
                <strong>Ενεργοί Χρήστες:</strong>
                <p style="font-size:11px; margin:2px 0 8px 0; color:#aaa;">(Κλικ για Πριβέ)</p>
                <div id="users-box"></div>
            </div>
            <div id="chat-cover">
                <p>Για να δεις τα μηνύματα και να συμμετάσχεις<br>βάλε το όνομά σου και κάνε Είσοδος!</p>
            </div>
        </div>
         
        <div id="login-screen">
            <input type="text" id="username" placeholder="Το όνομά σου..." maxlength="20">
            <button id="enter-btn">Είσοδος</button>
        </div>
         
        <div id="chat-controls" style="display:none;">
            <input type="text" id="msg-input" placeholder="Γράψε μήνυμα...">
            <button id="send-btn">📤 Αποστολή</button>
            <button id="emoji-btn">😀</button>
            <button id="image-btn">🖼️</button>
            <input type="file" id="image-upload" accept="image/*,image/gif" style="display:none;">
            <button id="exit-btn">🚪 Έξοδος</button>
            <button id="toggle-theme">🌙</button>
        </div>
    </div>

    <div id="emoji-picker"></div>

    <script>
        let currentName = localStorage.getItem("chatUser");
        let isLoggedIn = !!currentName && !currentName.startsWith("Guest_");
        let activePrivateTarget = null; 

        const notificationSound = new Audio('ping.mp3');
        let initialLoad = true;
        let lastKnownMsgId = null;
        let unreadFromUsers = new Set(); 
        
        // Έξυπνη μνήμη: Αποθηκεύει τα IDs των μηνυμάτων που έχουμε ήδη εμφανίσει/διαβάσει στην οθόνη
        let readMessagesIds = new Set();

        async function updatePresence() {
            if (!isLoggedIn) return;
            try {
                await fetch('/api/presence', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: currentName })
                });
            } catch(e) {}
        }

        async function fetchPresence() {
            if (!isLoggedIn) return;
            try {
                const res = await fetch('/api/presence');
                const users = await res.json();
                const box = document.getElementById("users-box");
                box.innerHTML = "";
                users.forEach(u => {
                    if (u !== currentName) {
                        const badge = unreadFromUsers.has(u) ? ` <span class="unread-badge">Νέο!</span>` : '';
                        box.innerHTML += `<div class="user-row" onclick="startPrivateChat('${u}')">👤 ${u}${badge}</div>`;
                    } else {
                        box.innerHTML += `<div style="margin:5px 0; padding:6px; text-align:center; color:#888;">👤 ${u} (Εσύ)</div>`;
                    }
                });
            } catch(e) {}
        }

        function startPrivateChat(targetUser) {
            activePrivateTarget = targetUser;
            unreadFromUsers.delete(targetUser); 
            document.getElementById("room-title").textContent = `Συνομιλία με: ${targetUser} [Πριβέ]`;
            document.getElementById("room-title").style.color = "#ff00ff";
            document.getElementById("chat-wrapper").style.borderColor = "#ff00ff";
            document.getElementById("back-to-global").style.display = "inline-block";
            initialLoad = true;
            fetchMessages();
        }

        document.getElementById("back-to-global").onclick = () => {
            activePrivateTarget = null;
            document.getElementById("room-title").textContent = `Δωμάτιο: Γενικό Chat`;
            document.getElementById("room-title").style.color = "#00ff00";
            document.getElementById("chat-wrapper").style.borderColor = "#00ff00";
            document.getElementById("back-to-global").style.display = "none";
            initialLoad = true;
            fetchMessages();
        };

        if (isLoggedIn) {
            updatePresence();
            setInterval(updatePresence, 5000);
            fetchPresence();
            setInterval(fetchPresence, 4000);
            document.getElementById("chat-header").style.display = "flex";
        }

        document.getElementById("enter-btn").onclick = async () => {
            let newName = document.getElementById("username").value.trim();
            if (!newName) return alert("Πρέπει να βάλεις όνομα!");
            const welcomeDiv = document.getElementById("welcome-overlay");
            welcomeDiv.innerHTML = `Καλώς ήρθες, <strong>${newName}</strong>! 🎉<br>Φόρτωση...`;
            welcomeDiv.style.display = "flex";
            
            localStorage.setItem("chatUser", newName);
            setTimeout(() => location.reload(), 1200);
        };

        if (isLoggedIn) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("chat-controls").style.display = "flex";
            document.getElementById("chat-cover").style.display = "none";
        } else {
            currentName = "Guest_" + Math.floor(Math.random() * 1000);
        }

        async function sendMessage(text, imageUrl = null) {
            if (!isLoggedIn || (!text && !imageUrl)) return;
            try {
                await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user: currentName, 
                        text: text || "", 
                        image: imageUrl,
                        to: activePrivateTarget 
                    })
                });
                fetchMessages();
            } catch(e) {}
        }

        document.getElementById("send-btn").onclick = () => {
            const input = document.getElementById("msg-input");
            sendMessage(input.value.trim());
            input.value = "";
        };

        document.getElementById("msg-input").addEventListener("keypress", e => {
            if (e.key === "Enter") document.getElementById("send-btn").click();
        });

        const chatBox = document.getElementById("chat-box");
        async function fetchMessages() {
            if (!isLoggedIn) return;
            try {
                const res = await fetch(`/api/messages?user=${encodeURIComponent(currentName)}`);
                const messages = await res.json();
                
                let htmlContent = "";
                let newestMsgId = null;
                let lastMessageUser = null;
                let hasIncomingNewPrivate = false;

                // 1. Έλεγχος για πραγματικά ΝΕΑ πριβέ μηνύματα
                messages.forEach(m => {
                    // Αν το μήνυμα είναι για μένα, από άλλον, και ΔΕΝ το έχουμε ξαναδεί/διαβάσει
                    if (m.to === currentName && !readMessagesIds.has(m.id)) {
                        if (m.user === activePrivateTarget) {
                            // Αν έχουμε ήδη ανοιχτό το πριβέ με αυτόν, το μαρκάρουμε αμέσως διαβασμένο
                            readMessagesIds.add(m.id);
                        } else {
                            // Αν είμαστε αλλού, ανάβει η ειδοποίηση
                            if (!unreadFromUsers.has(m.user)) {
                                unreadFromUsers.add(m.user);
                                hasIncomingNewPrivate = true;
                            }
                        }
                    }
                });

                if (hasIncomingNewPrivate) {
                    fetchPresence(); 
                }

                // 2. Φιλτράρισμα για την κεντρική οθόνη
                const visibleMessages = messages.filter(m => {
                    if (activePrivateTarget === null) {
                        return !m.to; 
                    } else {
                        return m.to === activePrivateTarget || (m.user === activePrivateTarget && m.to === currentName);
                    }
                });

                visibleMessages.forEach(data => {
                    const isOwn = data.user === currentName;
                    const isPrivate = !!data.to;
                    
                    // Κάθε μήνυμα που εμφανίζεται στην οθόνη μας, θεωρείται πλέον "διαβασμένο"
                    readMessagesIds.add(data.id);

                    htmlContent += `<div class="message ${isOwn ? 'own' : ''} ${isPrivate ? 'private-msg' : ''}">`;
                    htmlContent += `<strong>${data.user}${isPrivate ? ' [Πριβέ]' : ''}:</strong> `;
                    if (data.text) htmlContent += data.text;
                    if (data.image) htmlContent += `<br><img src="${data.image}" style="max-width:280px; border-radius:8px; margin-top:6px;">`;
                    htmlContent += `</div>`;
                    
                    newestMsgId = data.id;
                    lastMessageUser = data.user;
                });

                const isAtBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight <= 30;
                chatBox.innerHTML = htmlContent;

                if (initialLoad || isAtBottom || newestMsgId !== lastKnownMsgId) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                if (!initialLoad && newestMsgId !== lastKnownMsgId && lastMessageUser !== currentName) {
                    notificationSound.play().catch(e => console.log("Sound error"));
                }
                
                if(newestMsgId) {
                    lastKnownMsgId = newestMsgId;
                }
                initialLoad = false;
                
                // Πάντα ανανεώνουμε τη λίστα παρουσίας για να σβήσει το badge σωστά
                fetchPresence();
            } catch(e) {}
        }

        if (isLoggedIn) {
            fetchMessages();
            setInterval(fetchMessages, 2000);
        }

        document.getElementById("exit-btn").onclick = async () => {
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: currentName })
                });
            } catch(e) {}
            localStorage.clear();
            location.reload();
        };

        const emojis = ["😀","😂","😍","🥰","😎","🔥","❤️","👍","👎","🎉","🚀","💯","🙌","😢","😱"];
        const picker = document.getElementById("emoji-picker");
        emojis.forEach(emo => {
            const span = document.createElement("span");
            span.className = "emoji";
            span.textContent = emo;
            span.onclick = () => {
                document.getElementById("msg-input").value += emo;
                picker.style.display = "none";
            };
            picker.appendChild(span);
        });

        document.getElementById("emoji-btn").onclick = (e) => {
            e.stopPropagation();
            picker.style.display = picker.style.display === "flex" ? "none" : "flex";
        };
        document.addEventListener("click", () => picker.style.display = "none");

        document.getElementById("image-btn").onclick = () => document.getElementById("image-upload").click();
        document.getElementById("image-upload").onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !isLoggedIn) return;
            const reader = new FileReader();
            reader.onload = (ev) => sendMessage("", ev.target.result);
            reader.readAsDataURL(file);
        };

        let isDark = true;
        document.getElementById("toggle-theme").onclick = () => {
            isDark = !isDark;
            const btn = document.getElementById("toggle-theme");
            btn.textContent = isDark ? "🌙" : "☀️";
            if (isDark) {
                document.body.style.backgroundColor = "#000";
                document.getElementById("chat-wrapper").style.backgroundColor = "rgba(0,0,0,0.95)";
            } else {
                document.body.style.backgroundColor = "#222233";
                document.getElementById("chat-wrapper").style.backgroundColor = "rgba(40,40,60,0.95)";
            }
        };
    </script>
</body>
</html>
